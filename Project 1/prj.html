<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance System</title>
<link rel="stylesheet" href="prj.css">
</head>

<body>

<div class="container">
    <h1>📊 Attendance System</h1>

    <!-- Navigation -->
    <div class="nav">
        <button onclick="showPage('subject')">Subjects</button>
        <button onclick="showPage('bunk')">Bunk</button>
        <button onclick="showPage('needed')">Needed</button>
    </div>

    <!-- SUBJECT PAGE -->
    <div id="subject" class="page active">
        <h3>Subject-wise Attendance</h3>

        <table>
            <tr>
                <th>Subject</th>
                <th>Attended</th>
                <th>Total</th>
            </tr>

            <tr>
                <td>Maths</td>
                <td><input type="number" id="a1"></td>
                <td><input type="number" id="t1"></td>
            </tr>

            <tr>
                <td>Java</td>
                <td><input type="number" id="a2"></td>
                <td><input type="number" id="t2"></td>
            </tr>

            <tr>
                <td>DBMS</td>
                <td><input type="number" id="a3"></td>
                <td><input type="number" id="t3"></td>
            </tr>
        </table>

        <button onclick="calculateSubjects()">Calculate</button>
        <div id="result"></div>
    </div>

    <!-- BUNK PAGE -->
    <div id="bunk" class="page">
        <h3>Bunk Calculator</h3>

        <input type="number" id="b_attended" placeholder="Attended">
        <input type="number" id="b_total" placeholder="Total">

        <button onclick="calculateBunk()">Check</button>
        <div id="b_result"></div>
    </div>

    <!-- NEEDED PAGE -->
    <div id="needed" class="page">
        <h3>Classes Needed</h3>

        <input type="number" id="n_attended" placeholder="Attended">
        <input type="number" id="n_total" placeholder="Total">

        <button onclick="calculateNeeded()">Calculate</button>
        <div id="n_result"></div>
    </div>

</div>

<script src="prj.js"></script>
</body>
</html>
